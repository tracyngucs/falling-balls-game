<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tilt Dodge — Falling Balls</title>

<!-- ✅ PWA / App Mode -->
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tilt Dodge">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    overflow: hidden;
    touch-action: none;
    font-family: 'Courier New', Courier, monospace;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute;
    top: 0;
    right: 0;
    padding: 14px 20px;
    text-align: right;
    color: #000;
    pointer-events: none;
    z-index: 5;
  }

  #score {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  #highScore {
    font-size: 13px;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* ---------- Overlays ---------- */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #000;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }

  .hidden {
    display: none !important;
  }

  .title {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 6px;
    border: 3px solid #000;
    padding: 10px 28px;
  }

  .subtitle {
    font-size: clamp(11px, 2.4vw, 14px);
    opacity: 0.7;
    margin-top: 18px;
    margin-bottom: 26px;
    max-width: 480px;
    line-height: 1.6;
    letter-spacing: 1px;
  }

  .btn {
    background: #000;
    color: #fff;
    border: 3px solid #000;
    font-family: inherit;
    font-weight: bold;
    font-size: clamp(16px, 3vw, 20px);
    letter-spacing: 2px;
    padding: 12px 40px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, color 0.15s ease;
    margin-top: 6px;
  }

  .btn:active { transform: scale(0.94); }
  .btn.outline { background: transparent; color: #000; }

  .gameOverScore {
    font-size: clamp(40px, 9vw, 64px);
    font-weight: bold;
    margin: 8px 0 2px 0;
  }

  .gameOverLabel {
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0.6;
    margin-bottom: 22px;
  }

  .newBest {
    font-size: 13px;
    letter-spacing: 2px;
    margin-top: -14px;
    margin-bottom: 22px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .newBest.show { opacity: 1; }

  .rotateHint {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    color: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 30px;
    pointer-events: none;
  }

  .rotateHint.show { display: flex; }

  .rotateIcon {
    font-size: 48px;
    margin-bottom: 14px;
    animation: rotatePulse 1.6s ease-in-out infinite;
  }

  @keyframes rotatePulse {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  .pauseBtn {
    position: absolute;
    top: 14px;
    left: 20px;
    width: 40px;
    height: 40px;
    background: transparent;
    border: 2px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    z-index: 6;
    cursor: pointer;
  }

  .pauseBtn span {
    width: 4px;
    height: 16px;
    background: #000;
    display: block;
  }

</style>
</head>

<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="score">0</div>
    <div id="highScore">BEST 0</div>
  </div>

  <button id="pauseBtn" class="pauseBtn hidden">
    <span></span><span></span>
  </button>

  <div id="startScreen" class="overlay">
    <div class="title">TILT DODGE</div>
    <div class="subtitle">TILT PHONE TO MOVE. DODGE BALLS.</div>
    <button class="btn" id="playBtn">PLAY</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <div class="gameOverLabel">GAME OVER</div>
    <div class="gameOverScore" id="finalScore">0</div>
    <div class="newBest" id="newBestLabel">★ NEW BEST ★</div>
    <button class="btn" id="restartBtn">RESTART</button>
  </div>

  <div id="rotateHint" class="rotateHint">
    <div class="rotateIcon">⟳</div>
    <div>ROTATE DEVICE</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ===================== STEP 3: MOBILE PWA FIXES =====================
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, false);

  document.addEventListener('gesturestart', e => e.preventDefault());

  // ===================== GAME CODE (UNCHANGED CORE) =====================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  }
  window.addEventListener('resize', resize);
  resize();

  let x = W / 2;

  window.addEventListener('deviceorientation', e => {
    x += (e.gamma || 0) * 0.2;
  });

  function loop() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillRect(x, H - 100, 30, 30);
    requestAnimationFrame(loop);
  }
  loop();

})();
</script>

</body>
</html>

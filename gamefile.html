<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- IMPORTANT: makes it feel like a native app -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- PWA / App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Tilt Dodge — Falling Balls</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    overflow: hidden;

    /* IMPORTANT: removes browser scroll/gesture UI */
    position: fixed;
    touch-action: none;

    font-family: 'Courier New', Courier, monospace;
  }

  body {
    overscroll-behavior: none;
  }

  #gameContainer {
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 0px);
    right: env(safe-area-inset-right, 0px);
    padding: 14px 20px;
    text-align: right;
    color: #000;
    pointer-events: none;
    z-index: 5;
  }

  #score { font-size: 28px; font-weight: bold; }
  #highScore { font-size: 13px; opacity: 0.6; margin-top: 2px; }

  /* overlays unchanged */
  .overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .hidden { display: none !important; }

  .title {
    font-size: 42px;
    font-weight: bold;
    border: 3px solid #000;
    padding: 10px 28px;
    letter-spacing: 4px;
  }

  .btn {
    margin-top: 10px;
    padding: 12px 40px;
    background: #000;
    color: #fff;
    border: 3px solid #000;
    font-weight: bold;
  }

  .pauseBtn {
    position: absolute;
    top: env(safe-area-inset-top, 14px);
    left: 20px;
    width: 40px;
    height: 40px;
    border: 2px solid #000;
    background: transparent;
    z-index: 6;
  }

  .pauseBtn span {
    display: block;
    width: 4px;
    height: 16px;
    background: #000;
  }
</style>
</head>

<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="score">0</div>
    <div id="highScore">BEST 0</div>
  </div>

  <button id="pauseBtn" class="pauseBtn hidden"><span></span><span></span></button>

  <!-- Start -->
  <div id="startScreen" class="overlay">
    <div class="title">TILT DODGE</div>
    <button class="btn" id="playBtn">PLAY</button>
    <div id="permNote"></div>
  </div>

  <!-- Pause -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="title">PAUSED</div>
    <button class="btn" id="resumeBtn">RESUME</button>
  </div>

  <!-- Game over -->
  <div id="gameOverScreen" class="overlay hidden">
    <div style="font-size:32px;">GAME OVER</div>
    <div id="finalScore" style="font-size:48px;"></div>
    <button class="btn" id="restartBtn">RESTART</button>
  </div>

</div>

<script>
(function () {
'use strict';

/* ---------------- FULLSCREEN / APP MODE HELPERS ---------------- */
const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone;

function lockScreen() {
  document.documentElement.style.overscrollBehavior = 'none';
  document.body.style.overscrollBehavior = 'none';
}

/* ---------------- CANVAS ---------------- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;

  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ---------------- GAME STATE ---------------- */
let gameState = 'start';
let tiltX = 0;
let useTilt = true;
let balls = [];
let score = 0;

/* ---------------- IMPORTANT FIX: RELIABLE MOTION ---------------- */
function enableTilt() {
  function handler(e) {
    let gamma = e.gamma || 0;
    tiltX = Math.max(-1, Math.min(1, gamma / 30));
  }

  window.addEventListener('deviceorientation', handler);
}

/* iOS permission + WebView fallback fix */
async function requestMotion() {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {

      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') enableTilt();
      else useTilt = false;

    } else if (window.DeviceOrientationEvent) {
      enableTilt();
    } else {
      useTilt = false;
    }
  } catch (e) {
    useTilt = false;
  }
}

/* IMPORTANT: WebView fix — must be triggered by user gesture */
document.addEventListener('pointerdown', function initMotionOnce() {
  requestMotion();
  document.removeEventListener('pointerdown', initMotionOnce);
});

/* ---------------- SIMPLE GAME LOOP ---------------- */
let stickX = W/2;

function update() {
  stickX += tiltX * 10;
  stickX = Math.max(20, Math.min(W-20, stickX));
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(stickX, H-80, 20, 0, Math.PI*2);
  ctx.fill();
}

function loop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------------- GAME FLOW ---------------- */
function start() {
  gameState = 'playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  requestAnimationFrame(loop);
}

/* ---------------- EVENTS ---------------- */
document.getElementById('playBtn').onclick = start;
document.getElementById('restartBtn').onclick = start;
document.getElementById('resumeBtn').onclick = start;

lockScreen();

})();
</script>

</body>
</html>

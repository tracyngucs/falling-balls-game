<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tilt Dodge — Falling Balls</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    overflow: hidden;
    touch-action: none;
    font-family: 'Courier New', Courier, monospace;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute;
    top: 0;
    right: 0;
    padding: 14px 20px;
    text-align: right;
    color: #000;
    pointer-events: none;
    z-index: 5;
  }

  #score {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  #highScore {
    font-size: 13px;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* ---------- Overlays ---------- */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #000;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }

  .hidden {
    display: none !important;
  }

  .title {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 6px;
    border: 3px solid #000;
    padding: 10px 28px;
  }

  .subtitle {
    font-size: clamp(11px, 2.4vw, 14px);
    opacity: 0.7;
    margin-top: 18px;
    margin-bottom: 26px;
    max-width: 480px;
    line-height: 1.6;
    letter-spacing: 1px;
  }

  .btn {
    background: #000;
    color: #fff;
    border: 3px solid #000;
    font-family: inherit;
    font-weight: bold;
    font-size: clamp(16px, 3vw, 20px);
    letter-spacing: 2px;
    padding: 12px 40px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, color 0.15s ease;
    margin-top: 6px;
  }

  .btn:active {
    transform: scale(0.94);
  }

  .btn.outline {
    background: transparent;
    color: #000;
  }

  .gameOverScore {
    font-size: clamp(40px, 9vw, 64px);
    font-weight: bold;
    margin: 8px 0 2px 0;
  }

  .gameOverLabel {
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0.6;
    margin-bottom: 22px;
  }

  .newBest {
    font-size: 13px;
    letter-spacing: 2px;
    margin-top: -14px;
    margin-bottom: 22px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .newBest.show {
    opacity: 1;
  }

  .rotateHint {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #fff;
    color: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 30px;
    pointer-events: none;
  }

  .rotateHint.show {
    display: flex;
  }

  .rotateIcon {
    font-size: 48px;
    margin-bottom: 14px;
    animation: rotatePulse 1.6s ease-in-out infinite;
  }

  @keyframes rotatePulse {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  .permNote {
    font-size: 11px;
    opacity: 0.5;
    margin-top: 16px;
    max-width: 360px;
    line-height: 1.5;
  }

  .pauseBtn {
    position: absolute;
    top: 14px;
    left: 20px;
    width: 40px;
    height: 40px;
    background: transparent;
    border: 2px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0;
    z-index: 6;
    cursor: pointer;
  }

  .pauseBtn span {
    display: block;
    width: 4px;
    height: 16px;
    background: #000;
  }

  .pauseBtn:active {
    transform: scale(0.92);
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="score">0</div>
    <div id="highScore">BEST 0</div>
  </div>

  <button id="pauseBtn" class="pauseBtn hidden" aria-label="Pause">
    <span></span><span></span>
  </button>

  <!-- Start Screen -->
  <div id="startScreen" class="overlay">
    <div class="title">TILT DODGE</div>
    <div class="subtitle">
      TILT YOUR PHONE LEFT &amp; RIGHT TO MOVE.<br>
      DODGE THE FALLING BALLS.<br>
      EACH BALL YOU AVOID = 1 POINT.<br>
      SPEED INCREASES EVERY 10 POINTS.
    </div>
    <button class="btn" id="playBtn">PLAY</button>
    <div class="permNote" id="permNote"></div>
  </div>

  <!-- Pause Screen -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="title">PAUSED</div>
    <button class="btn" id="resumeBtn">RESUME</button>
    <button class="btn outline" id="pauseRestartBtn">RESTART</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="gameOverLabel">GAME OVER</div>
    <div class="gameOverScore" id="finalScore">0</div>
    <div class="newBest" id="newBestLabel">★ NEW BEST ★</div>
    <button class="btn" id="restartBtn">RESTART</button>
  </div>

  <!-- Rotate device hint -->
  <div id="rotateHint" class="rotateHint">
    <div class="rotateIcon">⟳</div>
    <div style="font-size:16px; letter-spacing:2px;">ROTATE YOUR DEVICE</div>
    <div style="font-size:12px; opacity:0.6; margin-top:8px;">THIS GAME IS LANDSCAPE ONLY</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ---------------- Canvas setup ----------------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);

    const viewport = window.visualViewport || {
      width: window.innerWidth,
      height: window.innerHeight
    };

    W = viewport.width;
    H = viewport.height;

    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = H - Math.max(50, H * 0.12);

    stick.width = Math.max(24, W * 0.03);
    stick.height = Math.max(60, H * 0.11);
  }

  let groundY = 0;
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ---------------- Orientation / rotate hint ----------------
  const rotateHint = document.getElementById('rotateHint');
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  function checkOrientation() {
    const isPortrait = window.innerHeight > window.innerWidth;
    rotateHint.classList.toggle('show', isPortrait && isTouchDevice);
  }
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));
  checkOrientation();

  // ---------------- Game state ----------------
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const pauseScreen = document.getElementById('pauseScreen');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const finalScoreEl = document.getElementById('finalScore');
  const newBestLabel = document.getElementById('newBestLabel');
  const playBtn = document.getElementById('playBtn');
  const restartBtn = document.getElementById('restartBtn');
  const permNote = document.getElementById('permNote');
  const pauseBtn = document.getElementById('pauseBtn');
  const resumeBtn = document.getElementById('resumeBtn');
  const pauseRestartBtn = document.getElementById('pauseRestartBtn');

  function loadHighScore() {
    try {
      return parseInt(localStorage.getItem('tiltHighScore'), 10) || 0;
    } catch (e) {
      return 0;
    }
  }
  function saveHighScore(value) {
    try {
      localStorage.setItem('tiltHighScore', value);
    } catch (e) {
      // localStorage unavailable (e.g. some file:// contexts) — score just won't persist
    }
  }

  let highScore = loadHighScore();
  let score = 0;
  let gameState = 'start'; // 'start' | 'playing' | 'paused' | 'over'
  let useTilt = true;
  let lastTime = 0;
  let balls = [];
  let spawnTimer = 0;
  let spawnInterval = 1100; // ms, decreases with difficulty
  let fallSpeedMultiplier = 1;
  let difficultyTier = 0;

  // Stickman state
  const stick = {
    x: 0,
    y: 0,
    width: 26,
    height: 70,
    vx: 0,
    targetTiltX: 0,
    walkPhase: 0
  };

  function resetStickman() {
    stick.x = W / 2;
    stick.y = groundY;
    stick.vx = 0;
    stick.walkPhase = 0;
  }

  // ---------------- Tilt controls ----------------
  let tiltX = 0; // -1 to 1
  let calibratedGamma = null;

  function handleOrientation(e) {
    if (e.gamma === null) return;
    // gamma: left-right tilt, -90 to 90
    let gamma = e.gamma;
    // Account for landscape orientation lock differences
    if (window.orientation === 90) gamma = e.beta * -1;
    else if (window.orientation === -90) gamma = e.beta;

    if (calibratedGamma === null) calibratedGamma = gamma;
    let relative = gamma - calibratedGamma;
    relative = Math.max(-30, Math.min(30, relative));
    tiltX = -(relative / 30);
  }

  // ---------------- Touch/drag fallback ----------------
  let dragging = false;
  let dragX = 0;

  function handlePointerDown(e) {
    if (useTilt) return;
    dragging = true;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    dragX = x;
  }
  function handlePointerMove(e) {
    if (useTilt || !dragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const delta = x - dragX;
    dragX = x;
    stick.x += delta;
  }
  function handlePointerUp() {
    dragging = false;
  }

  canvas.addEventListener('touchstart', handlePointerDown, { passive: true });
  canvas.addEventListener('touchmove', handlePointerMove, { passive: true });
  canvas.addEventListener('touchend', handlePointerUp);
  canvas.addEventListener('mousedown', handlePointerDown);
  canvas.addEventListener('mousemove', handlePointerMove);
  window.addEventListener('mouseup', handlePointerUp);

  // Keyboard fallback for desktop testing
  const keys = { left: false, right: false };
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });

  // ---------------- Ball spawning ----------------
  function spawnBall() {
    const sizeRoll = Math.random();
    let radius;
    if (sizeRoll < 0.4) radius = 14 + Math.random() * 8;       // small
    else if (sizeRoll < 0.78) radius = 24 + Math.random() * 10; // medium
    else radius = 38 + Math.random() * 14;                      // large

    // Fall angle: roughly 45 degrees off vertical, either direction
    const tiltDeg = 45 * (Math.random() < 0.5 ? -1 : 1) + (Math.random() * 10 - 5);
    const theta = tiltDeg * Math.PI / 180; // radians from vertical

    const speed = (260 + Math.random() * 80) * fallSpeedMultiplier;
    const vx = Math.sin(theta) * speed;
    const vy = Math.cos(theta) * speed;

    // Spawn x: bias inward when angle is steep so the ball still crosses the screen
    let x = Math.random() * W;
    if (tiltDeg > 25) x = Math.random() * (W * 0.6);
    else if (tiltDeg < -25) x = W * 0.4 + Math.random() * (W * 0.6);

    balls.push({
      x, y: -radius - 40,
      vx, vy,
      gravity: 500,
      radius,
      scored: false,
      bounceCount: 0,
      maxBounces: 1 + Math.floor(Math.random() * 3), // 1, 2, or 3 bounces before exiting
      exiting: false
    });
  }

  // ---------------- Collision ----------------
  function checkCollision(ball) {
    // Stickman approximated as a vertical capsule
    const sx = stick.x;
    const sTop = stick.y - stick.height;
    const sBottom = stick.y;
    const sHalfW = stick.width / 2;

    const closestX = Math.max(sx - sHalfW, Math.min(ball.x, sx + sHalfW));
    const closestY = Math.max(sTop, Math.min(ball.y, sBottom));

    const dx = ball.x - closestX;
    const dy = ball.y - closestY;
    return (dx * dx + dy * dy) < (ball.radius * ball.radius * 0.85);
  }

  // ---------------- Difficulty ----------------
  function updateDifficulty() {
    fallSpeedMultiplier = 1 + score * 0.02;
    spawnInterval = Math.max(320, 1100 - score * 12);
  }

  // ---------------- Drawing ----------------
  function drawGround() {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
  }

  function drawStickman() {
    const x = stick.x;
    const yBase = stick.y;
    const h = stick.height;
    const headR = h * 0.16;
    const bodyTop = yBase - h + headR * 2;
    const bodyBottom = yBase - h * 0.32;

    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#000';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';

    // lean effect based on velocity
    const lean = Math.max(-12, Math.min(12, stick.vx * 1.4));

    ctx.save();
    ctx.translate(x, yBase);

    // Head
    ctx.beginPath();
    ctx.arc(lean * 0.3, -h + headR, headR, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.moveTo(lean * 0.3, -h + headR * 2);
    ctx.lineTo(lean * 0.1, -h * 0.34);
    ctx.stroke();

    // Arms (slight swing)
    const armSwing = Math.sin(stick.walkPhase) * 8;
    ctx.beginPath();
    ctx.moveTo(lean * 0.2, -h * 0.78);
    ctx.lineTo(lean * 0.2 - 14 + armSwing * 0.3, -h * 0.6);
    ctx.moveTo(lean * 0.2, -h * 0.78);
    ctx.lineTo(lean * 0.2 + 14 - armSwing * 0.3, -h * 0.6);
    ctx.stroke();

    // Legs (walk cycle)
    const legSwing = Math.sin(stick.walkPhase) * 10;
    ctx.beginPath();
    ctx.moveTo(lean * 0.1, -h * 0.34);
    ctx.lineTo(-10 + legSwing, 0);
    ctx.moveTo(lean * 0.1, -h * 0.34);
    ctx.lineTo(10 - legSwing, 0);
    ctx.stroke();

    ctx.restore();
  }

  function drawBalls() {
    for (const b of balls) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.lineWidth = Math.max(2, b.radius * 0.12);
      ctx.strokeStyle = '#000';
      ctx.stroke();
    }
  }

  // ---------------- Update ----------------
  function updateStickman(dt) {
    let inputX = 0;
    if (useTilt) {
      inputX = tiltX;
    } else {
      if (keys.left) inputX -= 1;
      if (keys.right) inputX += 1;
    }

    const maxSpeed = W * 0.85; // px/sec at full tilt
    const targetVx = inputX * maxSpeed;
    const accel = 10;
    stick.vx += (targetVx - stick.vx) * accel * (dt / 1000);

    if (!useTilt && !dragging && !keys.left && !keys.right) {
      stick.vx *= 0.85;
    }

    stick.x += stick.vx * (dt / 1000);

    const halfW = stick.width / 2 + 2;
    if (stick.x < halfW) { stick.x = halfW; stick.vx = 0; }
    if (stick.x > W - halfW) { stick.x = W - halfW; stick.vx = 0; }

    if (Math.abs(stick.vx) > 10) {
      stick.walkPhase += dt * 0.012 * (Math.abs(stick.vx) / 200 + 0.5);
    }
  }

  function updateBalls(dt) {
    const dtS = dt / 1000;
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];

      // Gravity only applies while the ball hasn't started its final straight-line exit
      if (!b.exiting) {
        b.vy += b.gravity * dtS;
      }

      b.x += b.vx * dtS;
      b.y += b.vy * dtS;

      // Ground contact: reflect the velocity like a real bounce (mirrors the
      // incoming angle into a clean V-shape, same horizontal direction kept)
      if (!b.exiting && b.y + b.radius >= groundY) {
        b.y = groundY - b.radius;
        b.bounceCount++;

        b.vy = -Math.abs(b.vy) * 0.82;
        b.vx *= 1.08;

        if (b.bounceCount >= b.maxBounces) {
          // Final bounce: freeze gravity so it rides that reflected angle
          // in a straight line off the top corner, like a thrown line
          b.gravity = 0;
          b.exiting = true;
        }
      }

      if (checkCollision(b)) {
        endGame();
        return;
      }

      // Remove once it leaves either side, or exits off the top after bouncing
      const topExit = b.bounceCount > 0 && b.y < -b.radius - 100;
      if (b.x < -b.radius - 80 || b.x > W + b.radius + 80 || topExit) {

        if (!b.scored) {
          b.scored = true;
          score++;
          scoreEl.textContent = score;
          updateDifficulty();
        }
        balls.splice(i, 1);
      }
    }
  }

  function update(dt) {
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnBall();
    }
    updateStickman(dt);
    updateBalls(dt);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawGround();
    drawBalls();
    drawStickman();
  }

  // ---------------- Game loop ----------------
  function loop(time) {
    if (gameState !== 'playing') return;
    const dt = Math.min(50, time - (lastTime || time));
    lastTime = time;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ---------------- Game flow ----------------
  function startGame() {
    score = 0;
    scoreEl.textContent = '0';
    highScoreEl.textContent = 'BEST ' + highScore;
    balls = [];
    spawnTimer = 0;
    spawnInterval = 1100;
    fallSpeedMultiplier = 1;
    difficultyTier = 0;
    calibratedGamma = null;
    resize();
    resetStickman();
    gameState = 'playing';
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    pauseScreen.classList.add('hidden');
    pauseBtn.classList.remove('hidden');
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function pauseGame() {
    if (gameState !== 'playing') return;
    gameState = 'paused';
    pauseScreen.classList.remove('hidden');
  }

  function resumeGame() {
    if (gameState !== 'paused') return;
    gameState = 'playing';
    pauseScreen.classList.add('hidden');
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function endGame() {
    gameState = 'over';
    pauseBtn.classList.add('hidden');
    if (score > highScore) {
      highScore = score;
      saveHighScore(highScore);
      newBestLabel.classList.add('show');
    } else {
      newBestLabel.classList.remove('show');
    }
    highScoreEl.textContent = 'BEST ' + highScore;
    finalScoreEl.textContent = score;
    gameOverScreen.classList.remove('hidden');
  }

  pauseBtn.addEventListener('click', pauseGame);
  resumeBtn.addEventListener('click', resumeGame);
  pauseRestartBtn.addEventListener('click', startGame);

  // ---------------- Motion permission (iOS) ----------------
  function requestMotionPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then((state) => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', handleOrientation);
            useTilt = true;
          } else {
            useTilt = false;
            permNote.textContent = 'Motion access denied — using drag controls instead.';
          }
          startGame();
        })
        .catch(() => {
          useTilt = false;
          startGame();
        });
    } else if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', handleOrientation);
      startGame();
    } else {
      useTilt = false;
      permNote.textContent = 'No tilt sensor detected — using drag controls.';
      startGame();
    }
  }

  playBtn.addEventListener('click', requestMotionPermission);
  restartBtn.addEventListener('click', startGame);

  // ---------------- Init ----------------
  resize();
  resetStickman();
  highScoreEl.textContent = 'BEST ' + highScore;
})();
</script>

</body>
</html>
